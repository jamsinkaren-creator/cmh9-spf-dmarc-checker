<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Infrastructure & Deliverability Inspector</title>
    <style>
        :root {
            --bg-app: #f4f7f9;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --border-main: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-primary: #0f172a;
            --accent-hover: #334155;
            --success: #059669;
            --success-bg: #d1fae5;
            --error: #e11d48;
            --error-bg: #ffe4e6;
            --warning: #d97706;
            --badge-bg: #f1f5f9;
            --badge-text: #475569;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius: 8px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Consolas, monospace;
        }

        [data-theme="dark"] {
            --bg-app: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --border-main: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-hover: #7dd3fc;
            --success: #34d399;
            --success-bg: rgba(5, 150, 105, 0.2);
            --error: #fb7185;
            --error-bg: rgba(225, 29, 72, 0.2);
            --warning: #fbbf24;
            --badge-bg: #334155;
            --badge-text: #e2e8f0;
        }

        * { box-sizing: border-box; transition: background-color 0.2s, border-color 0.2s; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-app);
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container { max-width: 1280px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
        
        .btn {
            background: var(--accent-primary); color: #fff; border: none; padding: 10px 20px;
            border-radius: var(--radius); font-size: 0.9rem; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        }
        [data-theme="dark"] .btn { color: #0f172a; }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-outline {
            background: transparent; border: 1px solid var(--border-main); color: var(--text-main);
        }
        [data-theme="dark"] .btn-outline { color: var(--text-main); }
        .btn-outline:hover { border-color: var(--accent-primary); background: transparent; }

        .card {
            background: var(--bg-card); border: 1px solid var(--border-main);
            border-radius: var(--radius); padding: 24px; margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }

        .input-group { display: flex; flex-direction: column; gap: 12px; }
        .input-group label { font-weight: 600; font-size: 0.9rem; color: var(--text-main); }
        textarea {
            width: 100%; height: 120px; background: var(--bg-input); border: 1px solid var(--border-main);
            border-radius: var(--radius); color: var(--text-main); padding: 16px; font-family: var(--font-mono);
            font-size: 0.9rem; resize: vertical;
        }
        textarea:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1); }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .metric { background: var(--bg-card); border: 1px solid var(--border-main); padding: 20px; border-radius: var(--radius); display: flex; flex-direction: column; }
        .metric-val { font-size: 2rem; font-weight: 800; color: var(--accent-primary); line-height: 1; margin-bottom: 4px; }
        .metric-lbl { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

        .domain-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-main); }
        .domain-title { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        
        .table-wrap { overflow-x: auto; margin-bottom: 24px; border: 1px solid var(--border-main); border-radius: var(--radius); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
        th { background: var(--bg-app); color: var(--text-muted); font-weight: 600; padding: 12px 16px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border-main); }
        td { padding: 12px 16px; border-bottom: 1px solid var(--border-main); vertical-align: top; }
        tr:last-child td { border-bottom: none; }
        
        .mono { font-family: var(--font-mono); font-size: 0.8rem; word-break: break-all; }
        
        .badge { display: inline-flex; padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
        .badge.mechanism { background: var(--badge-bg); color: var(--badge-text); }
        .badge.success { background: var(--success-bg); color: var(--success); }
        .badge.error { background: var(--error-bg); color: var(--error); }
        
        .ip-list { max-height: 150px; overflow-y: auto; background: var(--bg-app); padding: 8px; border-radius: 4px; border: 1px solid var(--border-main); }
        .ip-list div { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-main); margin-bottom: 2px; }
        
        .spinner {
            width: 20px; height: 20px; border: 2px solid var(--border-main);
            border-top-color: var(--accent-primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .status-bar { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 0.9rem; color: var(--text-muted); }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Deliverability Infrastructure Inspector
        </h1>
        <button class="btn btn-outline" onclick="toggleTheme()">Toggle Theme</button>
    </div>

    <div class="card">
        <div class="input-group">
            <label for="domains">Target Domains (One per line)</label>
            <textarea id="domains" placeholder="example.com&#10;t-mobile.com"></textarea>
            <div style="display: flex; gap: 12px; margin-top: 8px;">
                <button class="btn" id="runBtn" onclick="runDiagnostics()">
                    <span class="spinner" id="btnSpinner"></span> 
                    <span id="btnText">Execute Deep Scan</span>
                </button>
                <button class="btn btn-outline" id="exportBtn" onclick="exportCSV()" style="display: none;">
                    Export Raw Data (CSV)
                </button>
            </div>
            <div class="status-bar" id="statusBar"></div>
        </div>
    </div>

    <div id="dashboard">
        <div class="metrics-grid">
            <div class="metric">
                <div class="metric-val" id="totalIps">0</div>
                <div class="metric-lbl">Total Unique IPs Discovered</div>
            </div>
            <div class="metric">
                <div class="metric-val" id="totalLookups">0</div>
                <div class="metric-lbl">DNS Lookups Triggered</div>
            </div>
        </div>
        <div id="resultsContainer"></div>
    </div>
</div>

<script>
    let globalIpStorage = {};
    let dnsLookupCount = 0;

    // Theme Management
    document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "light");
    function toggleTheme() {
        const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
    }

    // Core DNS Engine
    async function dnsQuery(name, type) {
        if(!name) return [];
        dnsLookupCount++;
        try {
            const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=${type}`, { headers: { 'Accept': 'application/dns-json' } });
            const data = await res.json();
            return data.Answer || [];
        } catch (e) { return []; }
    }

    // IP Subnet Expansion Engine
    async function expandCIDR(cidr) {
        if (!cidr.includes('/')) return [cidr];
        let [ip, mask] = cidr.split('/');
        mask = parseInt(mask);
        if (ip.includes(':') || mask < 24) return [cidr]; // Skip huge ranges or IPv6 expansion for browser safety
        
        let ips = [];
        let ipNum = ip.split('.').reduce((acc, octet) => (acc << 8) + parseInt(octet), 0) >>> 0;
        let count = Math.pow(2, 32 - mask);
        let start = ipNum & (0xFFFFFFFF << (32 - mask));
        
        for (let i = 0; i < count; i++) {
            let curr = start + i;
            ips.push([(curr >>> 24) & 255, (curr >>> 16) & 255, (curr >>> 8) & 255, curr & 255].join('.'));
        }
        return ips;
    }

    // SPF Mechanism Parser
    async function parseSpfMechanisms(domain, spfRecord, visited = new Set(), depth = 0) {
        if (visited.has(domain) || depth > 10) return [];
        visited.add(domain);
        
        let mechanismsData = [];
        const parts = spfRecord.replace(/^"|"$/g, '').split(/\s+/).filter(p => p.toLowerCase() !== 'v=spf1');

        for (let part of parts) {
            let qualifier = '+';
            if (['+', '-', '~', '?'].includes(part[0])) {
                qualifier = part[0];
                part = part.substring(1);
            }
            
            let type = part.split(':')[0].split('=')[0].toLowerCase();
            let target = part.includes(':') ? part.substring(part.indexOf(':') + 1) : 
                         (part.includes('=') ? part.substring(part.indexOf('=') + 1) : domain);
            
            let result = { qualifier, type, raw: part, target, resolvedDomains: [], ips: new Set() };

            if (type === 'include') {
                const txt = await dnsQuery(target, 'TXT');
                const spf = txt.find(r => r.data.toLowerCase().includes('v=spf1'));
                if (spf) {
                    result.resolvedDomains.push(target);
                    let subMechanisms = await parseSpfMechanisms(target, spf.data, visited, depth + 1);
                    result.sub = subMechanisms; // Store nested for logic, but we'll flatten for UI
                    subMechanisms.forEach(sm => sm.ips.forEach(ip => result.ips.add(ip)));
                }
            } 
            else if (type === 'redirect') {
                const txt = await dnsQuery(target, 'TXT');
                const spf = txt.find(r => r.data.toLowerCase().includes('v=spf1'));
                if (spf) {
                    result.resolvedDomains.push(target);
                    let subMechanisms = await parseSpfMechanisms(target, spf.data, visited, depth + 1);
                    subMechanisms.forEach(sm => sm.ips.forEach(ip => result.ips.add(ip)));
                }
            }
            else if (type === 'a') {
                const a = await dnsQuery(target, 'A');
                const aaaa = await dnsQuery(target, 'AAAA');
                [...a, ...aaaa].forEach(r => result.ips.add(r.data));
            } 
            else if (type === 'mx') {
                const mxs = await dnsQuery(target, 'MX');
                for (let mx of mxs) {
                    let hostname = mx.data.split(/\s+/)[1].replace(/\.$/, '');
                    result.resolvedDomains.push(hostname);
                    const a = await dnsQuery(hostname, 'A');
                    const aaaa = await dnsQuery(hostname, 'AAAA');
                    [...a, ...aaaa].forEach(r => result.ips.add(r.data));
                }
            } 
            else if (type === 'ip4' || type === 'ip6') {
                let expanded = await expandCIDR(target);
                expanded.forEach(ip => result.ips.add(ip));
            }

            result.ips = Array.from(result.ips);
            mechanismsData.push(result);
        }
        return mechanismsData;
    }

    async function runDiagnostics() {
        const input = document.getElementById('domains').value;
        const domains = input.split('\n').map(d => d.trim()).filter(Boolean);
        if (!domains.length) return;

        // Reset UI
        document.getElementById('btnSpinner').style.display = 'inline-block';
        document.getElementById('btnText').innerText = 'Analyzing...';
        document.getElementById('runBtn').disabled = true;
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('resultsContainer').innerHTML = '';
        globalIpStorage = {};
        dnsLookupCount = 0;
        let totalUniqueIps = new Set();

        for (let domain of domains) {
            document.getElementById('statusBar').innerText = `Analyzing configuration for ${domain}...`;
            
            // Fetch DMARC
            const dmarcTxt = await dnsQuery(`_dmarc.${domain}`, 'TXT');
            const dmarc = dmarcTxt.find(r => r.data.toLowerCase().includes('v=dmarc1'));
            
            // Fetch SPF
            const spfTxt = await dnsQuery(domain, 'TXT');
            const spf = spfTxt.find(r => r.data.toLowerCase().includes('v=spf1'));
            
            let mechanisms = [];
            if (spf) {
                mechanisms = await parseSpfMechanisms(domain, spf.data);
            }

            // Store IPs for export
            globalIpStorage[domain] = new Set();
            mechanisms.forEach(m => {
                m.ips.forEach(ip => {
                    globalIpStorage[domain].add(ip);
                    totalUniqueIps.add(ip);
                });
            });

            renderDomainCard(domain, dmarc ? dmarc.data : null, spf ? spf.data : null, mechanisms);
        }

        // Update Metrics
        document.getElementById('totalIps').innerText = totalUniqueIps.size;
        document.getElementById('totalLookups').innerText = dnsLookupCount;
        
        // Finalize UI
        document.getElementById('btnSpinner').style.display = 'none';
        document.getElementById('btnText').innerText = 'Execute Deep Scan';
        document.getElementById('runBtn').disabled = false;
        document.getElementById('statusBar').innerText = 'Diagnostics complete.';
        document.getElementById('exportBtn').style.display = 'inline-flex';
    }

    function renderDomainCard(domain, dmarc, spf, mechanisms) {
        const container = document.getElementById('resultsContainer');
        const card = document.createElement('div');
        card.className = 'card';

        let html = `
            <div class="domain-header">
                <div class="domain-title">🌐 ${escapeHtml(domain)}</div>
                <button class="btn btn-outline" onclick="copyIps('${domain}')">Copy IPs</button>
            </div>
            
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th style="width: 20%">Security Layer</th><th style="width: 15%">Status</th><th>Record Details</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><b>DMARC</b></td>
                            <td>${dmarc ? '<span class="badge success">Active</span>' : '<span class="badge error">Missing</span>'}</td>
                            <td class="mono">${dmarc ? escapeHtml(dmarc) : 'No _dmarc TXT record found.'}</td>
                        </tr>
                        <tr>
                            <td><b>SPF Base</b></td>
                            <td>${spf ? '<span class="badge success">Active</span>' : '<span class="badge error">Missing</span>'}</td>
                            <td class="mono">${spf ? escapeHtml(spf) : 'No v=spf1 TXT record found.'}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        `;

        if (mechanisms.length > 0) {
            html += `
                <h4 style="margin-bottom: 12px; font-size: 1rem;">SPF Mechanism Breakdown</h4>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 15%">Mechanism</th>
                                <th style="width: 25%">Target / Value</th>
                                <th style="width: 25%">Resolved Hostnames</th>
                                <th style="width: 35%">Mapped IPs (A/AAAA)</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            mechanisms.forEach(m => {
                let ipsHtml = m.ips.length ? `<div class="ip-list">${m.ips.map(ip => `<div>${ip}</div>`).join('')}</div>` : '<span class="mono" style="color:var(--text-muted)">N/A</span>';
                let hostsHtml = m.resolvedDomains.length ? m.resolvedDomains.map(d => `<div class="mono">${d}</div>`).join('') : '<span class="mono" style="color:var(--text-muted)">N/A</span>';
                
                html += `
                    <tr>
                        <td>
                            <span class="badge mechanism">${m.qualifier}${m.type}</span>
                        </td>
                        <td class="mono">${escapeHtml(m.raw)}</td>
                        <td>${hostsHtml}</td>
                        <td>${ipsHtml}</td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
        }

        card.innerHTML = html;
        container.appendChild(card);
    }

    function copyIps(domain) {
        const ips = Array.from(globalIpStorage[domain]);
        if (!ips.length) return alert('No IPs found for this domain.');
        navigator.clipboard.writeText(ips.join('\n'));
        alert(`Copied ${ips.length} IPs to clipboard.`);
    }

    function exportCSV() {
        let csvContent = "data:text/csv;charset=utf-8,Domain,IP\n";
        for (const [domain, ipSet] of Object.entries(globalIpStorage)) {
            Array.from(ipSet).forEach(ip => {
                csvContent += `${domain},${ip}\n`;
            });
        }
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "infrastructure_ips.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function escapeHtml(val) {
        return val ? val.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : '';
    }
</script>
</body>
</html>
